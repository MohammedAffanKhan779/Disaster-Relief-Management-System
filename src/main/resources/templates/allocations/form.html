<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Allocation - Disaster Relief Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-gradient-to-r from-blue-600 to-blue-800 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                    </svg>
                    <span class="text-white font-bold text-xl">Disaster Relief</span>
                </div>
                <div class="hidden md:flex space-x-1">
                    <a th:href="@{/}" class="text-blue-100 hover:bg-blue-700 hover:text-white px-4 py-2 rounded-lg font-medium transition-all duration-200">Home</a>
                    <a th:href="@{/allocations}" class="text-white bg-blue-700 px-4 py-2 rounded-lg font-medium transition-all duration-200">Allocations</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-8">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Page Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Create Allocation</h1>
                <p class="text-gray-600 mt-1">Allocate resources to a relief center</p>
            </div>

            <!-- Form Card -->
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <form th:action="@{/allocations}" th:object="${allocation}" method="post" class="space-y-6">
                    
                    <!-- Resource -->
                    <div>
                        <label for="resourceId" class="block text-sm font-semibold text-gray-700 mb-2">Resource</label>
                        <select id="resourceId" name="resourceId" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all duration-200 bg-gray-50 hover:bg-white">
                            <option value="">Select Resource</option>
                            <option th:each="resource : ${resources}" th:value="${resource.resourceId}" 
                                    th:text="${resource.name + ' (' + resource.type + ') - Available: ' + resource.quantity}"></option>
                        </select>
                    </div>

                    <!-- Relief Center -->
                    <div>
                        <label for="centerId" class="block text-sm font-semibold text-gray-700 mb-2">Destination Relief Center</label>
                        <select id="centerId" name="centerId" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all duration-200 bg-gray-50 hover:bg-white">
                            <option value="">Select Relief Center</option>
                            <option th:each="center : ${reliefCenters}" th:value="${center.centerId}" th:text="${center.name + ' - ' + center.location}"></option>
                        </select>
                    </div>

                    <!-- Quantity -->
                    <div>
                        <label for="allocatedQuantity" class="block text-sm font-semibold text-gray-700 mb-2">Quantity to Allocate</label>
                        <input type="number" id="allocatedQuantity" th:field="*{allocatedQuantity}" required min="1" placeholder="Enter quantity"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all duration-200 bg-gray-50 hover:bg-white">
                    </div>

                    <!-- Notes -->
                    <div>
                        <label for="notes" class="block text-sm font-semibold text-gray-700 mb-2">Notes (Optional)</label>
                        <textarea id="notes" th:field="*{notes}" rows="3" placeholder="Add any notes about this allocation"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all duration-200 bg-gray-50 hover:bg-white resize-none"></textarea>
                    </div>

                    <!-- Form Actions -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-4">
                        <button type="submit" 
                                class="flex-1 px-6 py-3 bg-teal-500 text-white font-semibold rounded-xl hover:bg-teal-600 transform hover:scale-[1.02] transition-all duration-200 shadow-md">
                            Create Allocation
                        </button>
                        <a th:href="@{/allocations}" 
                           class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-xl hover:bg-gray-300 transition-all duration-200 text-center">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2026 Disaster Relief Management System</p>
        </div>
    </footer>
</body>
</html>
