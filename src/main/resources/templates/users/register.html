<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration - Disaster Relief Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>Disaster Relief Management System</h1>
                <ul>
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/users}" class="active">Users</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>User Registration</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/users/register}" th:object="${user}" method="post" class="form">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" th:field="*{email}" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" th:field="*{phone}" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" th:field="*{password}" required>
            </div>

            <div class="form-group">
                <label for="role">Role:</label>
                <select id="role" th:field="*{role}" required>
                    <option value="">Select Role</option>
                    <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Register</button>
                <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Disaster Relief Management System</p>
        </div>
    </footer>
</body>
</html>
