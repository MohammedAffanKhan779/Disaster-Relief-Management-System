<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List - Disaster Relief Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>Disaster Relief Management System</h1>
                <ul>
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/disasters}">Disasters</a></li>
                    <li><a th:href="@{/donations}">Donations</a></li>
                    <li><a th:href="@{/users}" class="active">Users</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>User Management</h2>
        
        <div class="actions">
            <a th:href="@{/users/register}" class="btn btn-primary">Register New User</a>
        </div>

        <div th:if="${param.success}" class="alert alert-success">
            User registered successfully!
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}"></td>
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.phone}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <a th:href="@{/users/{id}(id=${user.userId})}" class="btn btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Disaster Relief Management System</p>
        </div>
    </footer>
</body>
</html>
